<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting</title>
  <script>
    (() => {
      if (location.hostname !== "zoziologie.raphaelnussbaumer.com" || location.pathname !== "/") return;
      const url = new URL("https://raphaelnussbaumer.com/");
      url.search = location.search;
      url.hash = location.hash;
      location.replace(url.href);
    })();
  </script>
</head>
<body>
  <p><a href="https://raphaelnussbaumer.com/">Continue</a></p>
</body>
</html>
